name: Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archive:
    name: Ruby 2.7 pure archive verification
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ruby:2.7@sha256:2347de892e419c7160fc21dec721d5952736909f8c3fbb7f84cb4a07aaf9ce7d
    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Show Ruby runtime
        run: ruby --version

      - name: Run full pure archive verification
        run: make check

  java-archive:
    name: Java 8 archived source compilation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Java 8
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '8'

      - name: Install pinned JRuby compile API
        run: gem install --user-install --no-document jruby-jars -v 1.7.27

      - name: Compile archived JRuby extension sources
        run: make java-check
