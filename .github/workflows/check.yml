name: Check

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archive:
    name: Ruby 2.7 pure archive verification
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ruby:2.7@sha256:2347de892e419c7160fc21dec721d5952736909f8c3fbb7f84cb4a07aaf9ce7d
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Show Ruby runtime
        run: ruby --version

      - name: Run full pure archive verification
        run: make check
